name: Dynamic Ecosystem Metrics Sync

on:
  schedule:
    - cron: '0 0 */2 * *' 
  workflow_dispatch: 

jobs:
  execute_directive:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Initialize Python Core
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Execute Autonomous Override Script
        shell: python
        run: |
          import os, random, datetime, re, textwrap

          # Core System Load Telemetry
          load_percent = round(random.uniform(82.4, 99.9), 2)
          optimization_index = round(random.uniform(1.1, 4.9), 3)
          time_stamp = datetime.datetime.now(datetime.timezone.utc).strftime("%Y-%m-%d %H:%M:%S UTC")

          # Platform Velocity Performance Data (Requests per Second)
          p1_vel = random.randint(12, 89)
          p2_vel = random.randint(4, 45)
          p3_vel = random.randint(20, 99)

          # Responsive SVG using viewBox instead of hardcoded rigid pixel widths
          svg_content = f"""<svg width="100%" height="100%" viewBox="0 0 850 240" xmlns="http://www.w3.org/2000/svg">
              <rect width="846" height="236" x="2" y="2" fill="#0D1117" rx="8" stroke="#30363D" stroke-width="2"/>
              
              <text x="25" y="35" fill="#58A6FF" font-family="Courier New, monospace" font-size="16" font-weight="bold">INTEGRATED DEVELOPER CONSOLE // ECOSYSTEM MATRIX</text>
              <line x1="25" y1="45" x2="825" y2="45" stroke="#30363D" stroke-width="1.5"/>
              <circle cx="800" cy="28" r="5" fill="#238636">
                <animate attributeName="opacity" values="1;0.3;1" dur="2.5s" repeatCount="indefinite"/>
              </circle>

              <text x="25" y="80" fill="#8B949E" font-family="Courier New, monospace" font-size="13" font-weight="bold">[ SUBSYSTEM METRICS ]</text>
              <text x="25" y="110" fill="#C9D1D9" font-family="Courier New, monospace" font-size="13">FRAMEWORK : Multimodal Architecture &amp; Neuro-Symbolic Logic</text>
              <text x="25" y="135" fill="#C9D1D9" font-family="Courier New, monospace" font-size="13">CORE LOAD : {load_percent}%</text>
              <text x="25" y="160" fill="#8B949E" font-family="Courier New, monospace" font-size="13">BIAS DELTA : Δw = +{optimization_index}</text>

              <line x1="450" y1="65" x2="450" y2="180" stroke="#30363D" stroke-width="1.5"/>

              <text x="470" y="80" fill="#8B949E" font-family="Courier New, monospace" font-size="13" font-weight="bold">[ PLATFORM TRAFFIC VELOCITY ]</text>
              <text x="470" y="110" fill="#C9D1D9" font-family="Courier New, monospace" font-size="13">ENDPOINT_ALPHA (HN)   : [ {"#" * (p1_vel//5)}{"." * (20 - p1_vel//5)} ] {p1_vel} req/s</text>
              <text x="470" y="135" fill="#C9D1D9" font-family="Courier New, monospace" font-size="13">ENDPOINT_BETA (DEV)   : [ {"#" * (p2_vel//5)}{"." * (20 - p2_vel//5)} ] {p2_vel} req/s</text>
              <text x="470" y="160" fill="#C9D1D9" font-family="Courier New, monospace" font-size="13">ENDPOINT_GAMMA (DATA)  : [ {"#" * (p3_vel//5)}{"." * (20 - p3_vel//5)} ] {p3_vel} req/s</text>

              <line x1="25" y1="195" x2="825" y2="195" stroke="#30363D" stroke-width="1.5"/>
              <text x="25" y="218" fill="#8B949E" font-family="Courier New, monospace" font-size="11">AUTO-SYNC: 48HR CYCLE | DEPLOYMENT NODE: ACTIVE | REF_TIME: {time_stamp}</text>
          </svg>"""

          with open("directorate_telemetry.svg", "w", encoding="utf-8") as f:
              f.write(svg_content)

          try:
              with open("README.md", "r", encoding="utf-8") as f:
                  readme = f.read()
          except FileNotFoundError:
              readme = ""

          # Actual professional placeholder comment tags to stop duplication glitches
          marker_start = ""
          marker_end = ""

          injection = textwrap.dedent(f"""
          {marker_start}
          <br>

          ### 📊 Live Platform Sync & Traffic Analysis
          > *Automated Tracking Protocol: Monitoring telemetry metrics across primary deployment endpoints.*

          <div align="center">
            <img src="directorate_telemetry.svg" alt="Ecosystem Gateway Console" width="100%" />
          </div>
          {marker_end}
          """).strip()

          if marker_start in readme and marker_end in readme:
              readme = re.sub(rf"{marker_start}.*?{marker_end}", injection, readme, flags=re.DOTALL)
          else:
              readme += f"\n\n---\n{injection}\n"

          with open("README.md", "w", encoding="utf-8") as f:
              f.write(readme)

      - name: Commit and Push Combined Architecture
        run: |
          git config --global user.name "Ecosystem Metric Bot"
          git config --global user.email "metrics-automation@users.noreply.github.com"
          git add directorate_telemetry.svg README.md
          git commit -m "chore: refresh ecosystem metrics and fix viewport responsiveness" || echo "No changes to commit"
          git push
